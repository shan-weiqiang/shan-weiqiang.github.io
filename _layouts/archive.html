---
layout: default
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
</head>
<body>
    <header>
        <h1>{{ page.title }}</h1>
    </header>
    
    <main>
        <ul>
            {% for post in page.posts %}
                <li><a href="{{ post.url }}">{{ post.title }}</a></li>
            {% endfor %}
        </ul>
    </main>
    
    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}</p>
    </footer>
</body>
</html>
